<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Note Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    h1 {
      color: #e0e0ff;
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 28px;
    }

    .note-checkboxes {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }

    .note-checkboxes label {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #c4c4e0;
      font-size: 0.95rem;
      cursor: pointer;
      user-select: none;
    }

    .note-checkboxes input[type="checkbox"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid #4a4a7a;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }

    .note-checkboxes input[type="checkbox"]:checked {
      background: #6c63ff;
      border-color: #6c63ff;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4l3 3 5-6' stroke='white' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: center;
    }

    .top-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 16px;
    }

    #generate-btn {
      background: linear-gradient(135deg, #6c63ff, #a855f7);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 36px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      box-shadow: 0 4px 20px rgba(108, 99, 255, 0.4);
    }

    #generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(108, 99, 255, 0.55);
    }

    #generate-btn:active {
      transform: translateY(0);
    }

    #generate-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    #listen-btn {
      background: linear-gradient(135deg, #0284c7, #0ea5e9);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 36px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      box-shadow: 0 4px 20px rgba(2, 132, 199, 0.4);
    }

    #listen-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(2, 132, 199, 0.55);
    }

    #listen-btn:active {
      transform: translateY(0);
    }

    #listen-btn.listening {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      box-shadow: 0 4px 20px rgba(220, 38, 38, 0.4);
      animation: pulse 1.2s ease-in-out infinite;
    }

    #listen-btn.listening:hover {
      box-shadow: 0 6px 28px rgba(220, 38, 38, 0.55);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.75; }
    }

    .sequence-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 16px;
    }

    .sequence-controls label {
      color: #c4c4e0;
      font-size: 0.95rem;
    }

    .sequence-controls input[type="number"] {
      width: 70px;
      padding: 8px 10px;
      background: #0f0f1a;
      border: 2px solid #2a2a4a;
      border-radius: 8px;
      color: #e0e0ff;
      font-size: 0.95rem;
      text-align: center;
      outline: none;
    }

    .sequence-controls input[type="number"]:focus {
      border-color: #6c63ff;
    }

    #sequence-btn {
      background: linear-gradient(135deg, #059669, #0d9488);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 24px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      box-shadow: 0 4px 20px rgba(5, 150, 105, 0.35);
    }

    #sequence-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(5, 150, 105, 0.5);
    }

    #sequence-btn:active {
      transform: translateY(0);
    }

    #sequence-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    #sequence-btn.running {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      box-shadow: 0 4px 20px rgba(220, 38, 38, 0.35);
    }

    #sequence-btn.running:hover {
      box-shadow: 0 6px 28px rgba(220, 38, 38, 0.5);
    }

    .note-display-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-top: 28px;
      min-height: 3.5rem;
    }

    #note-display {
      font-size: 3rem;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.05em;
      transition: color 0.15s;
    }

    #note-display.match   { color: #34d399; }
    #note-display.mismatch { color: #f87171; }

    #heard-note {
      display: none;
      font-size: 1.1rem;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 0.03em;
    }

    #heard-note span {
      color: #f87171;
      font-size: 1.4rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Random Note Generator</h1>
    <div class="note-checkboxes" id="checkboxes"></div>
    <div class="top-btns">
      <button id="generate-btn">Generate Note</button>
      <button id="listen-btn">Listen</button>
    </div>
    <div class="sequence-controls">
      <label for="interval-input">Every</label>
      <input type="number" id="interval-input" min="1" value="3">
      <label for="interval-input">seconds</label>
      <button id="sequence-btn">Start Random Sequence</button>
    </div>
    <div class="note-display-area">
      <div id="note-display"></div>
      <div id="heard-note">You: <span></span></div>
    </div>
  </div>

  <script>
    const noteNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

    const container = document.getElementById('checkboxes');
    const btn = document.getElementById('generate-btn');
    const sequenceBtn = document.getElementById('sequence-btn');
    const intervalInput = document.getElementById('interval-input');
    const display = document.getElementById('note-display');
    const heardNote = document.getElementById('heard-note');

    let targetNote = null;
    let sequenceTimer = null;
    let sequenceOnMatch = false;
    let matchCooldown = false;
    let audioCtx = null;
    let analyser = null;
    let micStream = null;
    let detectRaf = null;
    let isListening = false;
    let noteHistory = [];

    noteNames.forEach(note => {
      const label = document.createElement('label');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = note;
      cb.checked = true;
      cb.addEventListener('change', syncButtons);
      label.appendChild(cb);
      label.appendChild(document.createTextNode(note));
      container.appendChild(label);
    });

    function getSelected() {
      return [...container.querySelectorAll('input:checked')].map(cb => cb.value);
    }

    function randomNote() {
      const selected = getSelected();
      targetNote = selected[Math.floor(Math.random() * selected.length)];
      display.textContent = targetNote;
      display.className = '';
      heardNote.style.display = 'none';
    }

    function syncButtons() {
      const hasSelection = getSelected().length > 0;
      btn.disabled = !hasSelection;
      sequenceBtn.disabled = !hasSelection;
    }

    // ── Listen ────────────────────────────────────────────────
    const listenBtn = document.getElementById('listen-btn');

    listenBtn.addEventListener('click', async () => {
      isListening ? stopListening() : await startListening();
    });

    async function startListening() {
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        audioCtx.createMediaStreamSource(micStream).connect(analyser);
        isListening = true;
        listenBtn.textContent = 'Stop Listening';
        listenBtn.classList.add('listening');
        detectLoop(0);
      } catch (_) {
        display.textContent = 'Mic denied';
      }
    }

    function stopListening() {
      cancelAnimationFrame(detectRaf);
      micStream.getTracks().forEach(t => t.stop());
      audioCtx.close();
      audioCtx = analyser = micStream = null;
      noteHistory = [];
      isListening = false;
      listenBtn.textContent = 'Listen';
      listenBtn.classList.remove('listening');
      display.className = '';
      heardNote.style.display = 'none';
      if (sequenceOnMatch) stopSequence();
    }

    let lastDetect = 0;
    function detectLoop(ts) {
      if (!isListening) return;
      if (ts - lastDetect >= 100) {
        lastDetect = ts;
        const buf = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buf);
        const freq = autoCorrelate(buf, audioCtx.sampleRate);
        if (freq > 0) {
          noteHistory.push(freqToNote(freq));
          if (noteHistory.length > 5) noteHistory.shift();
        } else {
          noteHistory = [];
          display.className = '';
          heardNote.style.display = 'none';
        }
        if (targetNote && noteHistory.length >= 3) {
          const counts = {};
          for (const n of noteHistory) counts[n] = (counts[n] || 0) + 1;
          const [heard, count] = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
          if (count >= 3) {
            if (heard === targetNote) {
              display.className = 'match';
              heardNote.style.display = 'none';
              if (sequenceOnMatch && !matchCooldown) {
                matchCooldown = true;
                setTimeout(() => { randomNote(); matchCooldown = false; }, 600);
              }
            } else {
              display.className = 'mismatch';
              heardNote.querySelector('span').textContent = heard;
              heardNote.style.display = 'block';
            }
          }
        }
      }
      detectRaf = requestAnimationFrame(detectLoop);
    }

    function autoCorrelate(buf, sampleRate) {
      let rms = 0;
      for (let i = 0; i < buf.length; i++) rms += buf[i] * buf[i];
      rms = Math.sqrt(rms / buf.length);
      if (rms < 0.08) return -1; // too quiet

      const minLag = Math.floor(sampleRate / 1200);
      const maxLag = Math.min(Math.floor(sampleRate / 60), Math.floor(buf.length / 2));

      // Normalized autocorrelation for lags in musical range
      let c0 = 0;
      for (let i = 0; i < buf.length; i++) c0 += buf[i] * buf[i];

      const corr = new Float32Array(maxLag + 1);
      for (let lag = minLag; lag <= maxLag; lag++) {
        let s = 0;
        for (let i = 0; i < buf.length - lag; i++) s += buf[i] * buf[i + lag];
        corr[lag] = s / c0;
      }

      // Find first dip, then highest peak after it
      let d = minLag;
      while (d < maxLag && corr[d] > corr[d + 1]) d++;

      let maxVal = -1, bestLag = -1;
      for (let lag = d; lag <= maxLag; lag++) {
        if (corr[lag] > maxVal) { maxVal = corr[lag]; bestLag = lag; }
      }

      if (bestLag < 1 || maxVal < 0.72) return -1;

      // Parabolic interpolation for sub-sample accuracy
      const x1 = corr[bestLag - 1] ?? 0, x2 = corr[bestLag], x3 = corr[bestLag + 1] ?? 0;
      const a = (x1 + x3 - 2 * x2) / 2;
      const b = (x3 - x1) / 2;
      const T0 = a ? bestLag - b / (2 * a) : bestLag;

      return sampleRate / T0;
    }

    function freqToNote(freq) {
      const noteNum = Math.round(12 * Math.log2(freq / 440) + 69);
      return noteNames[((noteNum % 12) + 12) % 12];
    }

    // ── Generate / Sequence ───────────────────────────────────
    btn.addEventListener('click', randomNote);

    function stopSequence() {
      clearInterval(sequenceTimer);
      sequenceTimer = null;
      sequenceOnMatch = false;
      matchCooldown = false;
      sequenceBtn.textContent = 'Start Random Sequence';
      sequenceBtn.classList.remove('running');
    }

    sequenceBtn.addEventListener('click', () => {
      if (sequenceTimer || sequenceOnMatch) {
        stopSequence();
      } else if (isListening) {
        intervalInput.value = 0;
        sequenceOnMatch = true;
        randomNote();
        sequenceBtn.textContent = 'Stop Sequence';
        sequenceBtn.classList.add('running');
      } else {
        const seconds = Math.max(1, parseFloat(intervalInput.value) || 1);
        randomNote();
        sequenceTimer = setInterval(randomNote, seconds * 1000);
        sequenceBtn.textContent = 'Stop Sequence';
        sequenceBtn.classList.add('running');
      }
    });
  </script>
</body>
</html>
